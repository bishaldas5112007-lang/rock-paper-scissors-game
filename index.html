<!DOCTYPE html>
<html>
  <head>
    
    <title>
      rock paper scissor 
    </title>
    <link rel="stylesheet"  href="10-rock-paper-scissor.css">
  </head>

   
  <body>
     <P class="text">
      Rock Paper Scissor 
    </P>
    <button onclick="
     computerMove = pickComputerMove();
      playgame('rock'); "
       class="move-icon"
     ><img class="icon-image" src="rock-emoji.png"></button>

    <button onclick="
    playgame('paper')
     computerMove=pickComputerMove();"
     class="move-icon"
     > <img src="paper-emoji.png"  class="icon-image"></button>

    <button onclick="
    computerMove=pickComputerMove();
    playgame('scissors');"
    class="move-icon"
    > <img src="scissors-emoji.png"  class="icon-image"></button>
    

     <div class="query-text">
      <P class="js-player"></P>

     <P class="js-computer"></P>
     </div>

     <P class="js-score score-color"></P>
    
    <button
    onclick="
    score.wins = 0;
    score.lose= 0;
    score.tie= 0;
    scoreonpage();
    localStorage.removeItem('score');
"   class="reset">Reset Score</button>
   
    <script src="10-rock-paper-scissor.js"></script>
  </body>
</html>
